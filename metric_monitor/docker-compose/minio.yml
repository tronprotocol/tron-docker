version: '3.8'
services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    ports:
      - "9000:9000"  # Map port for API
      - "9001:9001"  # Map port for UI
    command: minio server /data --console-address ":9001"
    environment:
      # ⚠️ DEMO CREDENTIALS FOR LOCAL TESTING ONLY ⚠️
      # These are publicly known credentials for demonstration purposes
      # For production: Use AWS S3 or other cloud storage with proper IAM credentials
      # Never use these credentials in production environments
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: melovethanos
    volumes:
      - ../minio:/data
    restart: unless-stopped  # Optional: Restart policy
